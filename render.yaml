# render.yaml
services:
  - type: web
    name: kildear
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: gunicorn -k eventlet -w 1 'app:app'
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kildear-db
          property: connectionString
      - key: SESSION_COOKIE_SECURE
        value: 1
      - key: SESSION_COOKIE_HTTPONLY
        value: 1
      - key: SESSION_COOKIE_SAMESITE
        value: Lax
      - key: MAX_CONTENT_LENGTH
        value: 524288000
      - key: RENDER
        value: true

databases:
  - name: kildear-db
    plan: free
